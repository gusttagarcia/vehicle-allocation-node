<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Alocação de Veículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .card {
            border-radius: 10px;
            border: none;
        }
        .table th {
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4 text-center fw-bold text-secondary">Controle de Frota</h2>

    <div class="card shadow-sm p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="m-0 text-primary">Veículos Cadastrados</h5>
            <button class="btn btn-success fw-bold" onclick="abrirModal()">+ Novo Veículo</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-striped align-middle text-center">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Placa</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Ano</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody id="corpo-tabela">
                <tr>
                    <td colspan="7" class="text-center text-muted">Carregando veículos do banco de dados...</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<div class="modal fade" id="modalVeiculo" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitulo">Novo Veículo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formVeiculo">
                    <input type="hidden" id="veiculoId">

                    <div class="mb-3">
                        <label class="form-label">Placa</label>
                        <input type="text" class="form-control" id="placa" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Marca</label>
                            <input type="text" class="form-control" id="marca" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Modelo</label>
                            <input type="text" class="form-control" id="modelo" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Ano</label>
                            <input type="number" class="form-control" id="ano" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="disponivel">
                                <option value="true">Disponível</option>
                                <option value="false">Alugado</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="salvarVeiculo()">Salvar</button>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/veiculos.js"></script>
</body>
</html>
